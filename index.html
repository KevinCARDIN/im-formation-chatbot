<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Assistant formation</title>
  <link href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" rel="stylesheet" />
  <style>
    /* Page transparente : seule la bulle/fenêtre du chat est visible */
    html, body { margin: 0; height: 100%; background: transparent; }

    /* === Thème doré Invest Malin === */
    :root {
      /* Doré principal (bulle, bouton envoi, accents) */
      --chat--color-primary: #C9A227;
      --chat--color-primary-shade-50: #B5901F;
      --chat--color-primary-shade-100: #9E7D1A;
      /* Messages utilisateur en doré aussi */
      --chat--color-secondary: #C9A227;
      --chat--color-secondary-shade-50: #B5901F;

      /* Bouton bulle flottante (toggle) */
      --chat--toggle--background: #C9A227;
      --chat--toggle--hover--background: #B5901F;
      --chat--toggle--active--background: #9E7D1A;
      --chat--toggle--color: #ffffff;

      /* En-tête : fond blanc, titre doré compact */
      --chat--header--background: #ffffff;
      --chat--header--color: #C9A227;
      --chat--heading--font-size: 1.15em;
      --chat--subtitle--color: #8a8a8a;

      /* Message utilisateur : bulle dorée, texte foncé lisible */
      --chat--message--user--background: #C9A227;
      --chat--message--user--color: #1a1a1a;

      /* Coins arrondis */
      --chat--border-radius: 18px;
    }

    /* === Phase 2 : fenêtre plus jolie === */
    /* Coins arrondis sur toute la fenêtre */
    .chat-window {
      border-radius: 18px !important;
      overflow: hidden !important;
      box-shadow: 0 14px 44px rgba(0, 0, 0, 0.18) !important;
    }
    /* En-tête blanc et compact */
    .chat-header {
      background: #ffffff !important;
      padding: 13px 18px !important;
      border-bottom: 1px solid #ececec !important;
    }
    .chat-header h1 {
      font-size: 1.15rem !important;
      color: #C9A227 !important;
      margin: 0 !important;
    }
    .chat-header p {
      font-size: 0.82rem !important;
      color: #8a8a8a !important;
      margin: 2px 0 0 !important;
      line-height: 1.3 !important;
    }
    /* Texte des messages plus grand et aéré (le corps reste gris clair) */
    .chat-message {
      font-size: 1.05rem !important;
      line-height: 1.55 !important;
    }
  </style>
</head>
<body>
  <script type="module">
    import { createChat } from 'https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js';

    // Détection appareil mobile via la taille d'ÉCRAN (pas la taille de l'iframe).
    // Sur mobile : chat en ligne plein cadre (non bloquant). Sur ordi : bulle flottante.
    var isMobile = (typeof screen !== 'undefined' && screen.width && screen.width <= 768);

    createChat({
      webhookUrl: 'https://hub.cardin.cloud/webhook/2d2ef5b5-bfb3-44d5-86c8-1234605cb51b/chat',
      mode: isMobile ? 'fullscreen' : 'window',  // mobile = en ligne, ordi = bulle flottante
      showWelcomeScreen: false,
      initialMessages: [
        'Bonjour 👋',
        "Comment je peux t'aider aujourd'hui ?"
      ],
      i18n: {
        en: {
          title: 'Une question ? 👋',
          subtitle: 'Notre agent IA SAV te répond 24h/24.',
          inputPlaceholder: 'Pose ta question...',
          getStarted: 'Nouvelle conversation',
          footer: ''
        }
      }
    });

    // Force tous les liens renvoyés par le bot à s'ouvrir dans un nouvel onglet
    // (sinon ils tentent de s'ouvrir dans l'iframe, qui est minuscule)
    new MutationObserver(() => {
      document.querySelectorAll('a[href]').forEach(a => {
        if (a.target !== '_blank') {
          a.target = '_blank';
          a.rel = 'noopener noreferrer';
        }
      });
    }).observe(document.body, { childList: true, subtree: true });
  </script>
</body>
</html>
