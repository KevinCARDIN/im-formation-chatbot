<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Assistant formation</title>
  <link href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" rel="stylesheet" />
  <style>
    /* Fond de page neutre, le chat est une colonne centrée façon vraie messagerie */
    html, body {
      margin: 0;
      height: 100%;
      background: #eceae4;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    /* Le chat occupe une colonne centrée, blanche, avec une ombre douce */
    #n8n-chat {
      height: 100%;
      max-width: 860px;
      margin: 0 auto;
      background: #ffffff;
      box-shadow: 0 0 50px rgba(0, 0, 0, 0.10);
    }

    /* === Thème doré Invest Malin === */
    :root {
      --chat--color-primary: #C9A227;
      --chat--color-primary-shade-50: #B5901F;
      --chat--color-primary-shade-100: #9E7D1A;
      --chat--color-secondary: #C9A227;
      --chat--color-secondary-shade-50: #B5901F;

      /* En-tête blanc, titre doré */
      --chat--header--background: #ffffff;
      --chat--header--color: #C9A227;
      --chat--heading--font-size: 1.25em;
      --chat--subtitle--color: #8a8a8a;

      /* Messages : bot à gauche (bulle blanche bordée, bien visible),
         utilisateur à droite (doré) */
      --chat--message--bot--background: #ffffff;
      --chat--message--bot--color: #1a1a1a;
      --chat--message--bot--border: 1px solid #e6e6ea;
      --chat--message--user--background: #C9A227;
      --chat--message--user--color: #1a1a1a;
      --chat--message--user--border: none;
      --chat--message--font-size: 1rem;
      --chat--message--padding: 0.7rem 1rem;
      --chat--message--border-radius: 16px;

      --chat--border-radius: 14px;
      --chat--spacing: 1rem;

      /* Zone de saisie un peu plus haute, bien visible */
      --chat--textarea--height: 60px;
      --chat--input--background: #ffffff;
    }

    /* En-tête compact et propre */
    .chat-header { border-bottom: 1px solid #ececec !important; }
    .chat-header h1 { color: #C9A227 !important; margin: 0 !important; }
    .chat-header p  { color: #8a8a8a !important; margin: 2px 0 0 !important; }

    /* Bulles : lecture confortable + légère ombre pour le relief */
    .chat-message {
      line-height: 1.55 !important;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.06) !important;
      max-width: 80% !important;       /* les bulles ne prennent pas toute la largeur */
    }

    /* === Responsive === */
    /* Tablette */
    @media (max-width: 1024px) {
      #n8n-chat { max-width: 100%; }
    }
    /* Téléphone : plein cadre, en-tête et textes adaptés, pas d'ombre latérale */
    @media (max-width: 640px) {
      #n8n-chat { box-shadow: none; }
      :root {
        --chat--heading--font-size: 1.1em;
        --chat--message--font-size: 0.97rem;
        --chat--textarea--height: 52px;
      }
      .chat-header { padding: 11px 14px !important; }
      .chat-message { max-width: 88% !important; }
    }
  </style>
</head>
<body>
  <div id="n8n-chat"></div>

  <script type="module">
    import { createChat } from 'https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js';

    createChat({
      webhookUrl: 'https://hub.cardin.cloud/webhook/2d2ef5b5-bfb3-44d5-86c8-1234605cb51b/chat',
      mode: 'fullscreen',
      target: '#n8n-chat',
      showWelcomeScreen: false,
      initialMessages: [
        'Bonjour 👋',
        "Comment je peux t'aider aujourd'hui ?"
      ],
      i18n: {
        en: {
          title: 'Une question ? 👋',
          subtitle: 'Notre agent IA SAV te répond 24h/24.',
          inputPlaceholder: 'Pose ta question...',
          getStarted: 'Nouvelle conversation',
          footer: ''
        }
      }
    });

    // Les liens du bot s'ouvrent dans un nouvel onglet
    new MutationObserver(() => {
      document.querySelectorAll('a[href]').forEach(a => {
        if (a.target !== '_blank') {
          a.target = '_blank';
          a.rel = 'noopener noreferrer';
        }
      });
    }).observe(document.body, { childList: true, subtree: true });
  </script>
</body>
</html>
