<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Assistant formation</title>
  <link href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" rel="stylesheet" />
  <style>
    /* Page dédiée plein écran : le chat occupe 100% du cadre (pas de bulle) */
    html, body, #n8n-chat {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #f7f7fa;
    }

    /* === Thème doré Invest Malin === */
    :root {
      --chat--color-primary: #C9A227;
      --chat--color-primary-shade-50: #B5901F;
      --chat--color-primary-shade-100: #9E7D1A;
      --chat--color-secondary: #C9A227;
      --chat--color-secondary-shade-50: #B5901F;

      --chat--header--background: #ffffff;
      --chat--header--color: #C9A227;
      --chat--heading--font-size: 1.2em;
      --chat--subtitle--color: #8a8a8a;

      --chat--message--user--background: #C9A227;
      --chat--message--user--color: #1a1a1a;

      --chat--border-radius: 14px;

      /* En plein écran, on veut que la zone de saisie reste bien visible en bas */
      --chat--textarea--height: 56px;
    }

    /* En-tête blanc et compact */
    .chat-header {
      background: #ffffff !important;
      padding: 14px 20px !important;
      border-bottom: 1px solid #ececec !important;
    }
    .chat-header h1 {
      font-size: 1.2rem !important;
      color: #C9A227 !important;
      margin: 0 !important;
    }
    .chat-header p {
      font-size: 0.85rem !important;
      color: #8a8a8a !important;
      margin: 2px 0 0 !important;
      line-height: 1.3 !important;
    }
    /* Texte des messages plus grand et aéré */
    .chat-message {
      font-size: 1.05rem !important;
      line-height: 1.55 !important;
    }
    /* Largeur de lecture confortable au centre sur grand écran */
    .chat-body, .chat-messages-list {
      max-width: 860px;
      margin-left: auto !important;
      margin-right: auto !important;
    }
  </style>
</head>
<body>
  <!-- Conteneur plein cadre dans lequel le chat est monté -->
  <div id="n8n-chat"></div>

  <script type="module">
    import { createChat } from 'https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js';

    createChat({
      webhookUrl: 'https://hub.cardin.cloud/webhook/2d2ef5b5-bfb3-44d5-86c8-1234605cb51b/chat',
      mode: 'fullscreen',          // <-- plein écran (zone de texte sur toute la page, plus de bulle)
      target: '#n8n-chat',
      showWelcomeScreen: false,
      initialMessages: [
        'Bonjour 👋',
        "Comment je peux t'aider aujourd'hui ?"
      ],
      i18n: {
        en: {
          title: 'Une question ? 👋',
          subtitle: 'Notre agent IA SAV te répond 24h/24.',
          inputPlaceholder: 'Pose ta question...',
          getStarted: 'Nouvelle conversation',
          footer: ''
        }
      }
    });

    // Force les liens renvoyés par le bot à s'ouvrir dans un nouvel onglet
    // (sinon ils tentent de s'ouvrir dans l'iframe de la leçon)
    new MutationObserver(() => {
      document.querySelectorAll('a[href]').forEach(a => {
        if (a.target !== '_blank') {
          a.target = '_blank';
          a.rel = 'noopener noreferrer';
        }
      });
    }).observe(document.body, { childList: true, subtree: true });
  </script>
</body>
</html>
